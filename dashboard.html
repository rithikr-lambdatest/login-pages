<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
        }
        .navbar {
            background: #fff;
            padding: 16px 32px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h2 { font-size: 20px; color: #1a1a1a; }
        .navbar .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #555;
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #0066ff;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }
        .logout-btn {
            padding: 8px 16px;
            background: #f0f2f5;
            border: 1px solid #d0d5dd;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            color: #333;
            transition: background 0.2s;
        }
        .logout-btn:hover { background: #e4e6e9; }
        .container {
            max-width: 1100px;
            margin: 32px auto;
            padding: 0 24px;
        }
        .welcome {
            font-size: 28px;
            color: #1a1a1a;
            margin-bottom: 24px;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
        }
        .card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .card .value {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
        }
        .card .sub {
            font-size: 13px;
            color: #28a745;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <h2 id="navTitle">Dashboard</h2>
        <div class="user-info" id="userInfo">
            <div class="avatar" id="avatar"></div>
            <span id="navUser"></span>
            <button class="logout-btn" id="logoutBtn" onclick="window.location.href='index.html'">Logout</button>
        </div>
    </nav>
    <div class="container" id="mainContainer">
        <h1 class="welcome" id="welcome"></h1>
        <div class="cards" id="cardsGrid">
            <div class="card" id="totalTestsCard">
                <h3 id="totalTestsTitle">Total Tests</h3>
                <div class="value" id="totalTestsValue">1,284</div>
                <div class="sub" id="totalTestsSub">+12% from last week</div>
            </div>
            <div class="card" id="passedCard">
                <h3 id="passedTitle">Passed</h3>
                <div class="value" id="passedValue">1,140</div>
                <div class="sub" id="passedSub">88.8% pass rate</div>
            </div>
            <div class="card" id="failedCard">
                <h3 id="failedTitle">Failed</h3>
                <div class="value" id="failedValue">98</div>
                <div class="sub" id="failedSub" style="color:#d32f2f">7.6% failure rate</div>
            </div>
            <div class="card" id="runningCard">
                <h3 id="runningTitle">Running</h3>
                <div class="value" id="runningValue">46</div>
                <div class="sub" id="runningSub">3 queued</div>
            </div>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const username = params.get('user') || 'User';
        document.getElementById('welcome').textContent = 'Welcome, ' + username + '!';
        document.getElementById('navUser').textContent = username;
        document.getElementById('avatar').textContent = username.charAt(0).toUpperCase();
    </script>
</body>
</html>
