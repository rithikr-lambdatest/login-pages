<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dummy47</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            padding: 32px;
        }
        h1 {
            font-size: 28px;
            color: #1a1a1a;
            margin-bottom: 24px;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            max-width: 1100px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
        }
        .card h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .card .value {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
        }
        .card .sub {
            font-size: 13px;
            color: #28a745;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <h1 id="pageTitle">Dummy47</h1>
    <div class="cards" id="cardsGrid">
        <div class="card" id="totalTestsCard">
            <h3 id="totalTestsTitle">Total Tests</h3>
            <div class="value" id="totalTestsValue">1,284</div>
            <div class="sub" id="totalTestsSub">+12% from last week</div>
        </div>
        <div class="card" id="passedCard">
            <h3 id="passedTitle">Passed</h3>
            <div class="value" id="passedValue">1,140</div>
            <div class="sub" id="passedSub">88.8% pass rate</div>
        </div>
        <div class="card" id="failedCard">
            <h3 id="failedTitle">Failed</h3>
            <div class="value" id="failedValue">98</div>
            <div class="sub" id="failedSub" style="color:#d32f2f">7.6% failure rate</div>
        </div>
        <div class="card" id="runningCard">
            <h3 id="runningTitle">Running</h3>
            <div class="value" id="runningValue">46</div>
            <div class="sub" id="runningSub">3 queued</div>
        </div>
    </div>
</body>
</html>
