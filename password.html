<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-size: 24px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        p {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .user-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f0f2f5;
            border-radius: 20px;
            padding: 6px 14px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #333;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d0d5dd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus {
            border-color: #0066ff;
            box-shadow: 0 0 0 3px rgba(0,102,255,0.1);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 24px;
            background: #0066ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #0052cc; }
        .back-link {
            display: inline-block;
            margin-top: 16px;
            color: #0066ff;
            font-size: 14px;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
        .error {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card" id="loginCard">
        <h1 id="pageTitle">Enter password</h1>
        <p id="pageSubtitle">Verify your identity to continue</p>
        <div class="user-badge" id="userBadge"></div>
        <form id="passwordForm">
            <label id="passwordLabel" for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
            <span class="error" id="passwordError">Please enter a password</span>
            <button type="submit" id="submitBtn" class="btn">Submit</button>
        </form>
        <a href="index.html" id="backLink" class="back-link">Back</a>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const username = params.get('user') || 'User';
        document.getElementById('userBadge').textContent = username;

        document.getElementById('passwordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            if (!password) {
                document.getElementById('passwordError').style.display = 'block';
                return;
            }
            document.getElementById('passwordError').style.display = 'none';

            if (username === 'rithikrawat@123' && password === 'rithikrawat@123') {
                window.location.href = 'dashboard.html?user=' + encodeURIComponent(username);
            } else {
                document.getElementById('passwordError').textContent = 'Invalid credentials';
                document.getElementById('passwordError').style.display = 'block';
            }
        });
    </script>
</body>
</html>
