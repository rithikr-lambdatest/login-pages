<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Username</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-size: 24px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        p {
            color: #666;
            margin-bottom: 24px;
            font-size: 14px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d0d5dd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #0066ff;
            box-shadow: 0 0 0 3px rgba(0,102,255,0.1);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 24px;
            background: #0066ff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #0052cc; }
        .error {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card" id="loginCard">
        <h1 id="pageTitle">Sign in</h1>
        <p id="pageSubtitle">Enter your username to continue</p>
        <form id="usernameForm">
            <label id="usernameLabel" for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required>
            <span class="error" id="usernameError">Please enter a username</span>
            <button type="submit" id="nextBtn" class="btn">Next</button>
        </form>
    </div>
    <script>
        document.getElementById('usernameForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            if (!username) {
                document.getElementById('usernameError').style.display = 'block';
                return;
            }
            document.getElementById('usernameError').style.display = 'none';
            window.location.href = 'password.html?user=' + encodeURIComponent(username);
        });
    </script>
</body>
</html>
